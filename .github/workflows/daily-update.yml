name: Daily Interview Questions Update

on:
  schedule:
    - cron: '0 0 * * *' # 每天0点（UTC时间）自动运行
  workflow_dispatch: # 也可以手动触发
    inputs:
      force_update:
        description: 'Force update all questions'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  update-questions:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate new questions
        run: node scripts/generate-questions.js
        
      - name: Check for changes
        id: git-check
        run: |
          git add src/data/questions.ts
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Auto-update: Add new interview questions'
          title: '📚 Auto-update: Add new interview questions'
          body: |
            ## Summary
            This PR was automatically generated by the daily update workflow.
            
            ## Changes
            - Added new interview questions to keep content fresh
            - Updated question tags and categories
            
            Please review and merge if everything looks good!
            
            ---
            *Generated by GitHub Actions*
          branch: auto-update-questions
          delete-branch: true
          labels: |
            auto-update
            questions
          reviewers: lmwe
